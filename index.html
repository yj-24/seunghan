<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>XngHan&Xoul Glow</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@700;900&display=swap');
        
        body { 
            font-family: 'Pretendard', sans-serif; 
            touch-action: manipulation;
            user-select: none;
            background-color: #ffffff;
            min-height: 100vh;
            color: #000000;
        }

        .main-card {
            background: #ffffff;
            border: 2px solid #000000;
            border-radius: 2.5rem;
            box-shadow: 10px 10px 0px #000000;
        }

        .result-card { 
            background: #f3f4f6; 
            color: black; 
            border: 1px solid #000000;
            animation: slideIn 0.3s ease-out forwards; 
            border-radius: 1.2rem;
        }

        .summary-badge { 
            background: #000000; 
            color: #ffffff;
            border-radius: 99px;
        }

        @keyframes slideIn { 
            from { transform: translateY(12px); opacity: 0; } 
            to { transform: translateY(0); opacity: 1; } 
        }

        .hidden { display: none !important; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* 타이틀 스타일 수정 */
        .title-black {
            color: #000000;
            line-height: 1;
        }

        /* Glow 색상 변경 (#f8ff00) 및 가독성을 위한 약한 외곽선 추가 */
        .glow-highlight {
            color: #f8ff00;
            text-shadow: 
                -1px -1px 0 #000,  
                 1px -1px 0 #000,
                -1px  1px 0 #000,
                 1px  1px 0 #000;
        }
    </style>
</head>
<body class="py-10 px-6">

    <div class="max-w-md mx-auto relative">
        <!-- 타이틀 영역 -->
        <div class="flex justify-between items-start mb-10">
            <div class="flex flex-col text-left">
                <h1 class="text-3xl font-black tracking-tighter title-black">
                    XngHan&Xoul<br>
                    <span class="text-4xl italic glow-highlight">Glow</span>
                </h1>
            </div>
            <button id="admin-trigger" onclick="toggleAdminTab()" class="w-12 h-12 rounded-full border border-zinc-200 text-zinc-300 font-bold text-[10px] flex items-center justify-center">AD</button>
        </div>

        <!-- 메인 카드 -->
        <div class="main-card p-8 mb-8 text-center">
            <div id="display-container" class="h-80 flex flex-col items-center justify-start mb-6 overflow-y-auto no-scrollbar pt-2">
                <div id="intro-text" class="my-auto text-zinc-400 font-medium text-lg italic">Touch to Start</div>
                
                <!-- 당첨 요약 -->
                <div id="summary-area" class="w-full mb-6 flex flex-wrap justify-center gap-2 hidden"></div>
                
                <!-- 결과 리스트 -->
                <div id="results-wrapper" class="w-full space-y-2.5"></div>
            </div>
            
            <div class="flex gap-4 justify-center mb-8">
                <button onclick="changeQty(1)" id="qty-1" class="qty-btn w-14 h-14 rounded-2xl border-2 border-black font-bold bg-black text-white transition-all">1</button>
                <button onclick="changeQty(5)" id="qty-5" class="qty-btn w-14 h-14 rounded-2xl border-2 border-black font-bold bg-white text-black transition-all">5</button>
                <button onclick="changeQty(10)" id="qty-10" class="qty-btn w-14 h-14 rounded-2xl border-2 border-black font-bold bg-white text-black transition-all">10</button>
            </div>

            <button id="draw-button" onclick="executeDraw()" class="w-full py-6 bg-black text-white rounded-3xl text-2xl font-black active:scale-95 transition-all">
                <span id="draw-btn-label">1개 뽑기</span>
            </button>
        </div>

        <!-- 하단 현황 -->
        <div class="main-card p-7 border-2 border-black">
            <h2 class="text-[10px] font-bold mb-6 opacity-40 tracking-[0.2em] uppercase italic text-left">Prize Inventory</h2>
            <div id="prizes-status" class="space-y-5"></div>
        </div>

        <!-- 관리자 패널 -->
        <div id="admin-panel" class="hidden fixed inset-x-6 top-24 z-50 bg-white border-4 border-black p-8 shadow-[20px_20px_0px_#000000] rounded-3xl">
            <div class="flex justify-between items-center mb-6 border-b-2 border-black pb-4">
                <h2 class="font-black text-xl italic">ADMIN DATA</h2>
                <button onclick="toggleAdminTab()" class="text-zinc-400 font-bold text-sm">CLOSE</button>
            </div>
            <div id="admin-details" class="space-y-3 font-mono text-xs text-black mb-8 text-left"></div>
            <button onclick="fullReset()" class="w-full py-4 bg-red-50 text-red-600 border-2 border-red-600 rounded-2xl text-[10px] font-bold uppercase tracking-widest">System Factory Reset</button>
        </div>
    </div>

    <script>
        const PRIZE_CONFIG = [
            { id: 'A', name: '바지', count: 1, hideCount: false, limitPerQuart: [0, 0, 1, 1] }, 
            { id: 'B', name: '반다나', count: 9, hideCount: false, limitPerQuart: [2, 5, 7, 9] }, 
            { id: 'C', name: '사인폴라로이드', count: 15, hideCount: false, limitPerQuart: [4, 8, 12, 15] },
            { id: 'D', name: '사인앨범', count: 15, hideCount: false, limitPerQuart: [4, 8, 12, 15] },
            { id: 'E', name: '손그림 로고 키링', count: 60, hideCount: false },
            { id: 'F', name: '포토카드', count: 300, hideCount: true },
            { id: 'G', name: '엽서', count: 600, hideCount: true }
        ];

        let state = [];
        let drawQty = 1;

        function init() {
            const saved = localStorage.getItem('lucky_white_glow_v1');
            if (saved) {
                state = JSON.parse(saved);
            } else {
                state = JSON.parse(JSON.stringify(PRIZE_CONFIG));
                save();
            }
            render();
        }

        function save() { localStorage.setItem('lucky_white_glow_v1', JSON.stringify(state)); }

        function fullReset() {
            if(confirm("모든 데이터를 초기화하시겠습니까?")) {
                localStorage.removeItem('lucky_white_glow_v1');
                location.reload();
            }
        }

        function toggleAdminTab() {
            document.getElementById('admin-panel').classList.toggle('hidden');
        }

        function changeQty(n) {
            drawQty = n;
            document.querySelectorAll('.qty-btn').forEach(btn => {
                btn.classList.remove('bg-black', 'text-white');
                btn.classList.add('bg-white', 'text-black');
            });
            const activeBtn = document.getElementById(`qty-${n}`);
            activeBtn.classList.remove('bg-white', 'text-black');
            activeBtn.classList.add('bg-black', 'text-white');
            document.getElementById('draw-btn-label').innerText = `${n}개 뽑기`;
        }

        function render() {
            const prizeContainer = document.getElementById('prizes-status');
            const adminContainer = document.getElementById('admin-details');
            const historyCount = 1000 - state.reduce((acc, cur) => acc + cur.count, 0);

            prizeContainer.innerHTML = state.map(item => {
                const out = item.count === 0;
                let statusText = item.hideCount ? (out ? "SOLD OUT" : "IN STOCK") : (out ? "SOLD OUT" : `${item.count} LEFT`);
                return `
                    <div class="flex justify-between items-center ${out ? 'opacity-20' : ''}">
                        <div class="flex flex-col text-left">
                            <span class="text-[9px] text-zinc-400 font-bold uppercase mb-1 tracking-wider">${item.id} GRADE</span>
                            <span class="font-bold text-lg leading-none text-black">${item.name}</span>
                        </div>
                        <span class="text-[10px] font-black ${item.hideCount && !out ? 'text-blue-500' : 'text-zinc-400'}">${statusText}</span>
                    </div>
                `;
            }).join('');

            adminContainer.innerHTML = `
                <div class="mb-4 text-black font-bold border-b border-zinc-100 pb-2">Total Progress: ${historyCount}회</div>
            ` + state.map(item => `
                <div class="flex justify-between border-b border-zinc-50 pb-1">
                    <span>${item.id} - ${item.name}</span>
                    <span>${item.count} / ${PRIZE_CONFIG.find(p => p.id === item.id).count}</span>
                </div>
            `).join('');
        }

        async function executeDraw() {
            const btn = document.getElementById('draw-button');
            const wrapper = document.getElementById('results-wrapper');
            const summaryArea = document.getElementById('summary-area');
            const intro = document.getElementById('intro-text');
            
            const totalRemaining = state.reduce((acc, cur) => acc + cur.count, 0);
            if (totalRemaining < drawQty) { alert("잔여 수량이 부족합니다."); return; }

            btn.disabled = true;
            intro.classList.add('hidden');
            summaryArea.classList.add('hidden');
            summaryArea.innerHTML = "";
            wrapper.innerHTML = "";

            let pickedList = [];

            for (let i = 0; i < drawQty; i++) {
                const historyCount = 1000 - state.reduce((acc, cur) => acc + cur.count, 0);
                const currentQuart = Math.floor(historyCount / 250);

                const pool = state.filter(item => {
                    if (item.count <= 0) return false;
                    if (item.limitPerQuart) {
                        const maxAllowed = item.limitPerQuart[currentQuart];
                        const drawnSoFar = PRIZE_CONFIG.find(p => p.id === item.id).count - item.count;
                        if (drawnSoFar >= maxAllowed) return false;
                    }
                    return true;
                });

                const fallbackPool = pool.length > 0 ? pool : state.filter(item => item.count > 0 && !item.limitPerQuart);
                const poolTotal = fallbackPool.reduce((acc, cur) => acc + cur.count, 0);
                let rand = Math.floor(Math.random() * poolTotal);
                let accTotal = 0;
                let picked = null;

                for (let target of fallbackPool) {
                    accTotal += target.count;
                    if (rand < accTotal) {
                        picked = target;
                        state.find(orig => orig.id === target.id).count--;
                        break;
                    }
                }
                pickedList.push(picked);

                const card = document.createElement('div');
                card.className = "result-card p-4 rounded-xl flex justify-between items-center shadow-sm mb-2 text-left";
                card.innerHTML = `
                    <div class="flex flex-col">
                        <span class="text-[9px] font-bold opacity-30 uppercase mb-1">${picked.id} RANK</span>
                        <span class="text-xl font-black">${picked.name}</span>
                    </div>
                    <div class="bg-black text-white text-[9px] px-3 py-1 rounded-full font-bold uppercase tracking-tighter">Win</div>
                `;
                wrapper.prepend(card);
                save();
                render();
                await new Promise(r => setTimeout(r, 100));
            }

            const summary = pickedList.reduce((acc, cur) => {
                acc[cur.name] = (acc[cur.name] || 0) + 1;
                return acc;
            }, {});

            summaryArea.classList.remove('hidden');
            Object.entries(summary).forEach(([name, count]) => {
                const badge = document.createElement('div');
                badge.className = "summary-badge px-4 py-1.5 text-[11px] font-bold";
                badge.innerText = `${name} × ${count}`;
                summaryArea.appendChild(badge);
            });
            btn.disabled = false;
        }

        init();
    </script>
</body>
</html>
