<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>럭키드로우 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@700;900&display=swap');
        body { 
            font-family: 'Pretendard', sans-serif; 
            touch-action: manipulation;
            user-select: none;
            background-color: #f3f4f6;
        }
        .hidden-tab { display: none; }
        .win-effect { animation: confeti 0.5s ease-out; }
        @keyframes confeti {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body class="py-10 px-4">

    <div class="max-w-md mx-auto">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-3xl font-black text-gray-900">LUCKY DRAW</h1>
            <!-- 관리자 비밀 버튼: 수량 확인/관리 -->
            <button onclick="toggleAdminTab()" class="text-xs text-gray-400 underline">수량 확인/관리</button>
        </div>

        <!-- 메인 당첨 확인창 -->
        <div id="draw-section" class="bg-white rounded-3xl shadow-2xl p-8 text-center mb-8 border-4 border-black">
            <div id="status-text" class="h-40 flex items-center justify-center text-xl font-bold text-gray-400">
                START를 눌러주세요!
            </div>
            <button id="main-btn" onclick="startDraw()" class="w-full py-6 bg-black text-white rounded-2xl text-3xl font-black shadow-lg active:scale-95 transition-all">
                START !
            </button>
        </div>

        <!-- 사용자용 상품 현황판 -->
        <div id="guest-inventory-section" class="bg-white rounded-2xl shadow-md p-6 mb-4">
            <div class="flex justify-between items-center mb-4 border-b pb-2">
                <h2 class="font-bold text-lg">상품 현황</h2>
                <div id="draw-count-display" class="text-[10px] text-gray-400 font-mono italic"></div>
            </div>
            <div id="guest-inventory" class="space-y-4 text-base">
                <!-- 리스트 자동 생성 -->
            </div>
        </div>

        <!-- 관리자 상세 제어판 (기본 숨김) -->
        <div id="admin-tab" class="hidden-tab bg-gray-800 text-white rounded-2xl shadow-xl p-6 mt-4">
            <div class="flex justify-between items-center mb-4 border-b border-gray-600 pb-2">
                <h2 class="font-bold text-yellow-400 underline">상세 데이터 (Admin)</h2>
                <button onclick="toggleAdminTab()" class="text-xs bg-gray-600 px-2 py-1 rounded text-white">닫기</button>
            </div>
            <div id="admin-inventory" class="space-y-2 text-sm font-mono text-gray-300">
                <!-- 상세 수량 자동 생성 -->
            </div>
            <div class="mt-6 pt-4 border-t border-gray-700">
                <button onclick="resetData()" class="w-full py-2 bg-red-900 text-xs rounded text-gray-100 font-bold hover:bg-red-800 transition-colors">전체 데이터 리셋</button>
            </div>
        </div>
    </div>

    <script>
        // 초기 데이터 설정 (총 1,000개)
        const DEFAULT_ITEMS = [
            { id: 'A', name: '바지', count: 1, hideCount: false, total: 1 },
            { id: 'B', name: '반다나', count: 9, hideCount: false, total: 9 },
            { id: 'C', name: '사인폴라로이드', count: 15, hideCount: false, total: 15 },
            { id: 'D', name: '사인앨범', count: 15, hideCount: false, total: 15 },
            { id: 'E', name: '손그림 로고 키링', count: 60, hideCount: false, total: 60 },
            { id: 'F', name: '포토카드 (1종)', count: 300, hideCount: true, total: 300 },
            { id: 'G', name: '티저 엽서', count: 600, hideCount: true, total: 600 }
        ];

        let items = [];

        function loadData() {
            const saved = localStorage.getItem('luckyDrawData');
            if (saved) {
                items = JSON.parse(saved);
            } else {
                items = JSON.parse(JSON.stringify(DEFAULT_ITEMS));
                saveData();
            }
        }

        function saveData() {
            localStorage.setItem('luckyDrawData', JSON.stringify(items));
        }

        function resetData() {
            if(confirm("모든 데이터를 초기 수량(1,000개)으로 리셋하시겠습니까?")) {
                localStorage.removeItem('luckyDrawData');
                location.reload();
            }
        }

        function toggleAdminTab() {
            const tab = document.getElementById('admin-tab');
            tab.classList.toggle('hidden-tab');
            if (!tab.classList.contains('hidden-tab')) {
                tab.scrollIntoView({ behavior: 'smooth' });
            }
        }

        function getDrawHistoryCount() {
            const currentTotal = items.reduce((sum, item) => sum + item.count, 0);
            return 1000 - currentTotal;
        }

        function render() {
            const guestContainer = document.getElementById('guest-inventory');
            const adminContainer = document.getElementById('admin-inventory');
            const historyCount = getDrawHistoryCount();
            
            document.getElementById('draw-count-display').innerText = `Total Draw: ${historyCount}`;

            let totalLeft = 0;

            // [사용자용 화면] F, G 정보 완전 은닉
            guestContainer.innerHTML = items.map(item => {
                totalLeft += item.count;
                const isSoldOut = item.count === 0;
                let countLabel = "";

                if (item.hideCount) {
                    countLabel = isSoldOut ? "소진 (SOLD OUT)" : "재고 있음";
                } else {
                    countLabel = isSoldOut ? "소진" : `${item.count}개 남음`;
                }

                return `
                    <div class="flex justify-between items-center ${isSoldOut ? 'text-gray-300 line-through' : 'text-gray-800'}">
                        <span class="font-bold text-lg">${item.id}. ${item.name}</span>
                        <span class="font-bold ${item.hideCount && !isSoldOut ? 'text-blue-500' : 'text-gray-500'} text-sm">${countLabel}</span>
                    </div>
                `;
            }).join('');

            // [관리자용 화면] 상세 수량 추적
            adminContainer.innerHTML = items.map(item => `
                <div class="flex justify-between border-b border-gray-700 pb-1">
                    <span>${item.id}. ${item.name}</span>
                    <span class="${item.count < 5 ? 'text-yellow-400' : ''}">${item.count} / ${item.total}</span>
                </div>
            `).join('');

            if(totalLeft === 0) {
                const btn = document.getElementById('main-btn');
                btn.disabled = true;
                btn.innerText = "이벤트가 종료되었습니다";
                btn.classList.replace('bg-black', 'bg-gray-300');
            }
        }

        function startDraw() {
            const btn = document.getElementById('main-btn');
            const status = document.getElementById('status-text');
            const historyCount = getDrawHistoryCount();
            
            btn.disabled = true;
            status.innerHTML = `<div class="animate-bounce text-black text-4xl">?</div>`;

            setTimeout(() => {
                // 핵심 로직: 누적 참여 500회 미만일 때 A상(바지) 제외
                const availablePool = items.filter(item => {
                    if (item.id === 'A' && historyCount < 500) return false;
                    return item.count > 0;
                });

                const poolTotal = availablePool.reduce((sum, item) => sum + item.count, 0);
                
                if (poolTotal <= 0) {
                    status.innerText = "남은 상품이 없습니다.";
                    return;
                }

                let random = Math.floor(Math.random() * poolTotal);
                let currentSum = 0;
                let selected = null;

                for (let item of availablePool) {
                    currentSum += item.count;
                    if (random < currentSum) {
                        selected = item;
                        const original = items.find(i => i.id === selected.id);
                        original.count--;
                        break;
                    }
                }

                saveData();
                status.innerHTML = `
                    <div class="win-effect text-black">
                        <div class="text-blue-600 text-sm font-bold mb-1">${selected.id}등급 당첨!</div>
                        <div class="text-4xl font-black">${selected.name}</div>
                    </div>
                `;
                render();
                btn.disabled = false;
            }, 800);
        }

        loadData();
        render();

        window.onbeforeunload = function() {
            return "창을 닫으면 당첨 화면이 사라집니다.";
        };
    </script>
</body>
</html>
