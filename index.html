<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>XngHan&Xoul Glow</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@700;900&display=swap');
        
        body { 
            font-family: 'Pretendard', sans-serif; 
            touch-action: manipulation;
            user-select: none;
            background-color: #ffffff;
            min-height: 100vh;
            color: #000000;
            /* 하단 짤림 방지를 위해 150px의 넉넉한 여백 확보 */
            padding-bottom: 150px; 
            overflow-x: hidden;
        }

        .main-card, .inventory-card {
            background: #ffffff;
            border: 2px solid #000000;
            border-radius: 2.5rem;
            box-shadow: 10px 10px 0px #000000;
        }

        .inventory-card {
            height: auto !important;
            overflow: visible !important;
            margin-bottom: 50px;
        }

        .result-card { 
            background: #f3f4f6; 
            color: black; 
            border: 1px solid #000000;
            animation: slideIn 0.3s ease-out forwards; 
            border-radius: 1.2rem;
        }

        .summary-badge { 
            background: #000000; 
            color: #ffffff;
            border-radius: 99px;
        }

        /* 히스토리 아이템 스타일 */
        .history-item { 
            border: 1px solid #e5e7eb; 
            border-radius: 1rem; 
            margin-bottom: 0.75rem; 
            padding: 1rem; 
            background: #fafafa; 
        }
        
        .history-tag { 
            display: inline-block; 
            padding: 2px 8px; 
            border-radius: 4px; 
            font-size: 10px; 
            font-weight: bold; 
            margin: 2px; 
            background: #e5e7eb; 
            color: #6b7280; 
        }
        
        /* 당첨 강조 태그 (A~D등급) */
        .tag-special { 
            background: #f8ff00; 
            color: #000; 
            border: 1px solid #000; 
        }

        @keyframes slideIn { 
            from { transform: translateY(12px); opacity: 0; } 
            to { transform: translateY(0); opacity: 1; } 
        }

        .hidden { display: none !important; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .title-black {
            color: #000000;
            line-height: 1;
        }

        /* Glow 타이틀 색상: #f8ff00 */
        .glow-highlight {
            color: #f8ff00;
            text-shadow: 
                -1px -1px 0 #000,  
                 1px -1px 0 #000,
                -1px  1px 0 #000,
                 1px  1px 0 #000;
        }

        textarea { font-family: monospace; font-size: 10px; resize: none; }
    </style>
</head>
<body class="py-10 px-6">

    <div class="max-w-md mx-auto relative">
        <!-- 상단 타이틀 -->
        <div class="flex justify-between items-start mb-10">
            <div class="flex flex-col text-left">
                <h1 class="text-3xl font-black tracking-tighter title-black">
                    XngHan&Xoul<br>
                    <span class="text-4xl italic glow-highlight">Glow</span>
                </h1>
            </div>
            <button onclick="toggleAdminTab()" class="w-12 h-12 rounded-full border border-zinc-200 text-zinc-300 font-bold text-[10px] flex items-center justify-center">AD</button>
        </div>

        <!-- 드로우 메인 카드 -->
        <div class="main-card p-8 mb-12 text-center">
            <div id="display-container" class="h-80 flex flex-col items-center justify-start mb-6 overflow-y-auto no-scrollbar pt-2">
                <div id="intro-text" class="my-auto text-zinc-400 font-medium text-lg italic">Touch to Start</div>
                <div id="summary-area" class="w-full mb-6 flex flex-wrap justify-center gap-2 hidden"></div>
                <div id="results-wrapper" class="w-full space-y-2.5"></div>
            </div>
            
            <!-- 수량 선택 (1, 3, 5, 10) -->
            <div class="flex gap-3 justify-center mb-8">
                <button onclick="changeQty(1)" id="qty-1" class="qty-btn w-12 h-12 rounded-xl border-2 border-black font-bold bg-black text-white transition-all">1</button>
                <button onclick="changeQty(3)" id="qty-3" class="qty-btn w-12 h-12 rounded-xl border-2 border-black font-bold bg-white text-black transition-all">3</button>
                <button onclick="changeQty(5)" id="qty-5" class="qty-btn w-12 h-12 rounded-xl border-2 border-black font-bold bg-white text-black transition-all">5</button>
                <button onclick="changeQty(10)" id="qty-10" class="qty-btn w-12 h-12 rounded-xl border-2 border-black font-bold bg-white text-black transition-all">10</button>
            </div>

            <button id="draw-button" onclick="executeDraw()" class="w-full py-6 bg-black text-white rounded-3xl text-2xl font-black active:scale-95 transition-all">
                <span id="draw-btn-label">1개 뽑기</span>
            </button>
        </div>

        <!-- 상품 현황판 (pb-20으로 짤림 방지) -->
        <div class="inventory-card p-7 pb-20">
            <h2 class="text-[10px] font-bold mb-8 opacity-40 tracking-[0.2em] uppercase italic text-left">Prize Inventory</h2>
            <div id="prizes-status" class="space-y-6"></div>
        </div>

        <!-- 관리자 히스토리 & 동기화 패널 (전체 화면) -->
        <div id="admin-panel" class="hidden fixed inset-0 z-50 bg-white p-8 overflow-y-auto">
            <div class="flex justify-between items-center mb-8 pb-4 border-b-2 border-black">
                <h2 class="font-black text-2xl italic tracking-tighter">ADMIN & SYNC</h2>
                <button onclick="toggleAdminTab()" class="px-4 py-2 border-2 border-black font-bold rounded-xl text-sm">CLOSE</button>
            </div>
            
            <!-- 동기화 (기기간 데이터 이동) -->
            <div class="mb-10 p-6 border-2 border-dashed border-zinc-300 rounded-3xl bg-zinc-50">
                <h3 class="font-black text-sm mb-2 text-left">Device Sync</h3>
                <p class="text-[10px] opacity-60 mb-4 text-left">데이터를 PC로 옮기려면 아래 코드를 복사하세요.</p>
                <textarea id="sync-data" class="w-full h-20 p-3 border border-zinc-300 rounded-lg mb-3" readonly></textarea>
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="copySyncData()" class="py-2 bg-zinc-200 rounded-lg font-bold text-xs">코드 복사</button>
                    <button onclick="importSyncData()" class="py-2 bg-black text-white rounded-lg font-bold text-xs">코드 가져오기</button>
                </div>
            </div>

            <!-- 통계 요약 -->
            <div class="grid grid-cols-2 gap-4 mb-8 text-left">
                <div class="p-4 border-2 border-black rounded-2xl bg-zinc-50">
                    <p class="text-[10px] font-bold opacity-50 uppercase">총 드로우</p>
                    <p id="stat-total" class="text-3xl font-black">0</p>
                </div>
                <div class="p-4 border-2 border-black rounded-2xl bg-zinc-50">
                    <p class="text-[10px] font-bold opacity-50 uppercase">남은 재고</p>
                    <p id="stat-remain" class="text-3xl font-black">1000</p>
                </div>
            </div>

            <!-- 상품별 재고 상태 바 -->
            <div id="admin-prize-stats" class="space-y-2 mb-10"></div>

            <!-- 세션별 상세 로그 -->
            <h3 class="font-black mb-4 text-lg text-left">Detailed History</h3>
            <div id="history-log-list" class="space-y-4"></div>

            <button onclick="fullReset()" class="w-full mt-10 py-4 bg-red-50 text-red-600 border-2 border-red-600 rounded-2xl font-bold uppercase text-xs">System Factory Reset</button>
        </div>
    </div>

    <script>
        const PRIZE_CONFIG = [
            { id: 'A', name: '바지', count: 1, limitPerQuart: [0, 0, 1, 1] }, 
            { id: 'B', name: '반다나', count: 9, limitPerQuart: [2, 5, 7, 9] }, 
            { id: 'C', name: '사인폴라로이드', count: 15, limitPerQuart: [4, 8, 12, 15] },
            { id: 'D', name: '사인앨범', count: 15, limitPerQuart: [4, 8, 12, 15] },
            { id: 'E', name: '손그림 로고 키링', count: 60 },
            { id: 'F', name: '포토카드', count: 300, hideCount: true },
            { id: 'G', name: '엽서', count: 600, hideCount: true }
        ];

        let state = [];
        let sessionLogs = []; 
        let drawQty = 1;

        const SYNC_KEY_STATE = 'glow_final_state_v12';
        const SYNC_KEY_LOGS = 'glow_final_logs_v12';

        function init() {
            const savedState = localStorage.getItem(SYNC_KEY_STATE);
            const savedLogs = localStorage.getItem(SYNC_KEY_LOGS);
            if (savedState) { state = JSON.parse(savedState); } 
            else { state = JSON.parse(JSON.stringify(PRIZE_CONFIG)); save(); }
            if (savedLogs) { sessionLogs = JSON.parse(savedLogs); }
            render();
            updateSyncText();
        }

        function save() {
            localStorage.setItem(SYNC_KEY_STATE, JSON.stringify(state));
            localStorage.setItem(SYNC_KEY_LOGS, JSON.stringify(sessionLogs));
            updateSyncText();
        }

        // 동기화용 데이터 생성 (Base64 인코딩)
        function updateSyncText() {
            const syncObj = { state, sessionLogs };
            document.getElementById('sync-data').value = btoa(unescape(encodeURIComponent(JSON.stringify(syncObj))));
        }

        function copySyncData() {
            const textarea = document.getElementById('sync-data');
            textarea.select();
            document.execCommand('copy');
            alert("데이터 코드가 복사되었습니다! PC 브라우저 AD 페이지에 붙여넣으세요.");
        }

        function importSyncData() {
            const input = prompt("복사한 동기화 코드를 아래에 입력하세요:");
            if (!input) return;
            try {
                const decoded = JSON.parse(decodeURIComponent(escape(atob(input))));
                if (confirm("현재 기기의 데이터를 삭제하고 가져온 데이터로 동기화할까요?")) {
                    state = decoded.state;
                    sessionLogs = decoded.sessionLogs;
                    save();
                    location.reload();
                }
            } catch (e) {
                alert("올바르지 않은 코드입니다.");
            }
        }

        function fullReset() {
            if(confirm("모든 재고와 히스토리가 삭제됩니다. 계속하시겠습니까?")) {
                localStorage.clear(); location.reload();
            }
        }

        function toggleAdminTab() {
            document.getElementById('admin-panel').classList.toggle('hidden');
            if(!document.getElementById('admin-panel').classList.contains('hidden')) renderHistory();
        }

        function changeQty(n) {
            drawQty = n;
            document.querySelectorAll('.qty-btn').forEach(btn => {
                btn.classList.replace('bg-black', 'bg-white'); 
                btn.classList.replace('text-white', 'text-black');
            });
            const activeBtn = document.getElementById(`qty-${n}`);
            activeBtn.classList.replace('bg-white', 'bg-black'); 
            activeBtn.classList.replace('text-black', 'text-white');
            document.getElementById('draw-btn-label').innerText = `${n}개 뽑기`;
        }

        function render() {
            const prizeContainer = document.getElementById('prizes-status');
            prizeContainer.innerHTML = state.map(item => {
                const out = item.count === 0;
                let statusText = item.hideCount ? (out ? "SOLD OUT" : "IN STOCK") : (out ? "SOLD OUT" : `${item.count} LEFT`);
                return `<div class="flex justify-between items-center ${out ? 'opacity-20' : ''}"><div class="flex flex-col text-left"><span class="text-[9px] text-zinc-400 font-bold uppercase mb-1 tracking-wider">${item.id} GRADE</span><span class="font-bold text-lg leading-none text-black">${item.name}</span></div><span class="text-[10px] font-black ${item.hideCount && !out ? 'text-blue-500' : 'text-zinc-400'}">${statusText}</span></div>`;
            }).join('');
        }

        function renderHistory() {
            const totalDrawn = sessionLogs.reduce((acc, s) => acc + s.items.length, 0);
            document.getElementById('stat-total').innerText = totalDrawn;
            document.getElementById('stat-remain').innerText = 1000 - totalDrawn;

            const statsContainer = document.getElementById('admin-prize-stats');
            statsContainer.innerHTML = state.map(item => {
                const initial = PRIZE_CONFIG.find(p => p.id === item.id).count;
                const drawn = initial - item.count;
                const percent = ((drawn / initial) * 100).toFixed(1);
                return `<div class="flex items-center gap-3 text-[11px] text-left"><span class="w-20 font-bold truncate">${item.name}</span><div class="flex-1 h-2 bg-zinc-100 rounded-full overflow-hidden"><div class="h-full bg-black" style="width: ${percent}%"></div></div><span class="w-12 text-right opacity-50">${drawn}회</span></div>`;
            }).join('');

            const logList = document.getElementById('history-log-list');
            logList.innerHTML = sessionLogs.slice().reverse().map(session => `
                <div class="history-item">
                    <div class="flex justify-between items-center mb-2"><span class="text-[10px] font-bold opacity-40">${session.time}</span><span class="text-[10px] font-black">${session.items.length}개</span></div>
                    <div class="flex flex-wrap">${session.items.map(i => `<span class="history-tag ${['A','B','C','D'].includes(i.grade) ? 'tag-special' : ''}">${i.name}</span>`).join('')}</div>
                </div>
            `).join('');
        }

        async function executeDraw() {
            const totalRemaining = state.reduce((acc, cur) => acc + cur.count, 0);
            if (totalRemaining < drawQty) { alert("잔여 수량이 부족합니다."); return; }
            
            document.getElementById('draw-button').disabled = true;
            document.getElementById('intro-text').classList.add('hidden');
            document.getElementById('summary-area').classList.add('hidden');
            document.getElementById('summary-area').innerHTML = "";
            document.getElementById('results-wrapper').innerHTML = "";

            let pickedItems = [];
            const now = new Date();
            const timeStr = `${now.getHours()}:${now.getMinutes().toString().padStart(2,'0')}:${now.getSeconds().toString().padStart(2,'0')}`;

            for (let i = 0; i < drawQty; i++) {
                const drawnSoFar = sessionLogs.reduce((acc, s) => acc + s.items.length, 0);
                const currentQuart = Math.floor(drawnSoFar / 250);
                const pool = state.filter(item => {
                    if (item.count <= 0) return false;
                    if (item.limitPerQuart) {
                        const max = item.limitPerQuart[currentQuart];
                        const drawnTotal = PRIZE_CONFIG.find(p => p.id === item.id).count - item.count;
                        if (drawnTotal >= max) return false;
                    }
                    return true;
                });
                const fallback = pool.length > 0 ? pool : state.filter(item => item.count > 0 && !item.limitPerQuart);
                const total = fallback.reduce((acc, cur) => acc + cur.count, 0);
                let rand = Math.floor(Math.random() * total);
                let acc = 0; let picked = null;
                for (let t of fallback) { acc += t.count; if (rand < acc) { picked = t; state.find(o => o.id === t.id).count--; break; } }
                
                pickedItems.push({ name: picked.name, grade: picked.id });
                
                const card = document.createElement('div');
                card.className = "result-card p-4 rounded-xl flex justify-between items-center shadow-sm mb-2 text-left";
                card.innerHTML = `<div class="flex flex-col"><span class="text-[9px] font-bold opacity-30 uppercase mb-1">${picked.id} RANK</span><span class="text-xl font-black">${picked.name}</span></div><div class="bg-black text-white text-[9px] px-3 py-1 rounded-full font-bold uppercase tracking-widest">Win</div>`;
                document.getElementById('results-wrapper').prepend(card);
                render();
                await new Promise(r => setTimeout(r, 100));
            }

            sessionLogs.push({ time: timeStr, items: pickedItems });
            save();

            const summary = pickedItems.reduce((acc, cur) => { acc[cur.name] = (acc[cur.name] || 0) + 1; return acc; }, {});
            document.getElementById('summary-area').classList.remove('hidden');
            Object.entries(summary).forEach(([name, count]) => {
                const b = document.createElement('div'); b.className = "summary-badge px-4 py-1.5 text-[11px] font-bold"; b.innerText = `${name} × ${count}`;
                document.getElementById('summary-area').appendChild(b);
            });
            document.getElementById('draw-button').disabled = false;
        }

        init();
    </script>
</body>
</html>
