<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>XngHan&Xoul Glow</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@700;900&display=swap');
        
        body { 
            font-family: 'Pretendard', sans-serif; 
            touch-action: manipulation;
            user-select: none;
            background-color: #ffffff;
            min-height: 100vh;
            color: #000000;
            /* 하단 툴바가 가려도 엽서가 보이도록 바닥 공간을 아주 크게 확보 */
            padding-bottom: 250px; 
            overflow-x: hidden;
        }

        .main-card {
            background: #ffffff;
            border: 2px solid #000000;
            border-radius: 2.5rem;
            box-shadow: 10px 10px 0px #000000;
        }

        /* [핵심 수정] 하단 리스트 영역: 높이 제한 해제 및 하단 테두리 제거 */
        .inventory-section {
            background: #ffffff;
            border: 2px solid #000000;
            /* 하단 테두리를 없애 아래로 무한히 늘어나게 함 */
            border-bottom: none; 
            border-radius: 2.5rem 2.5rem 0 0; /* 하단 둥글기 제거 */
            /* 오른쪽/아래 그림자 제거 (잘려 보일 수 있음) */
            box-shadow: none; 
            width: 100%;
            padding: 2.5rem 1.8rem;
            /* 높이 설정 일절 없음 (Auto) */
            overflow: visible !important;
            display: block !important;
        }

        /* [핵심 수정] 검은색 그림자 판을 inventory-section 아래 붙여서 짤림 느낌 없앰 */
        .inventory-base {
            background: #000000;
            height: 12px; /* 그림자 두께 */
            width: 100%;
            border-radius: 0 0 2.5rem 2.5rem; /* 하단 둥글기 */
            margin-top: -2px; /* section 테두리와 겹치게 */
            margin-bottom: 50px;
        }

        .prize-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.2rem 0;
            border-bottom: 1px solid #f0f0f0; /* 구분선 */
        }

        /* 마지막 항목(엽서) 구분선 제거 */
        .prize-row:last-child {
            border-bottom: none;
        }

        .result-card { 
            background: #f3f4f6; 
            color: black; 
            border: 1px solid #000000;
            animation: slideIn 0.3s ease-out forwards; 
            border-radius: 1.2rem;
        }

        .summary-badge { background: #000000; color: #ffffff; border-radius: 99px; }
        .history-item { border: 1px solid #e5e7eb; border-radius: 1rem; margin-bottom: 0.75rem; padding: 1rem; background: #fafafa; }
        .history-tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: bold; margin: 2px; background: #e5e7eb; color: #6b7280; }
        .tag-special { background: #f8ff00; color: #000; border: 1px solid #000; }

        @keyframes slideIn { from { transform: translateY(12px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .hidden { display: none !important; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .glow-highlight { color: #f8ff00; text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000; }
        textarea { font-family: monospace; font-size: 10px; resize: none; border-radius: 10px; }
    </style>
</head>
<body class="py-10 px-6">

    <div class="max-w-md mx-auto relative">
        <div class="flex justify-between items-start mb-10">
            <div class="flex flex-col text-left">
                <h1 class="text-3xl font-black tracking-tighter leading-none">
                    XngHan&Xoul<br>
                    <span class="text-4xl italic glow-highlight">Glow</span>
                </h1>
            </div>
            <button onclick="toggleAdminTab()" class="w-12 h-12 rounded-full border border-zinc-200 text-zinc-300 font-bold text-[10px] flex items-center justify-center">AD</button>
        </div>

        <div class="main-card p-8 mb-12 text-center relative z-10">
            <div id="display-container" class="h-80 flex flex-col items-center justify-start mb-6 overflow-y-auto no-scrollbar pt-2 text-black">
                <div id="intro-text" class="my-auto text-zinc-400 font-medium text-lg italic">Touch to Start</div>
                <div id="summary-area" class="w-full mb-6 flex flex-wrap justify-center gap-2 hidden"></div>
                <div id="results-wrapper" class="w-full space-y-2.5"></div>
            </div>
            
            <div class="flex gap-3 justify-center mb-8">
                <button onclick="changeQty(1)" id="qty-1" class="qty-btn w-12 h-12 rounded-xl border-2 border-black font-bold bg-black text-white transition-all text-sm">1</button>
                <button onclick="changeQty(3)" id="qty-3" class="qty-btn w-12 h-12 rounded-xl border-2 border-black font-bold bg-white text-black transition-all text-sm">3</button>
                <button onclick="changeQty(5)" id="qty-5" class="qty-btn w-12 h-12 rounded-xl border-2 border-black font-bold bg-white text-black transition-all text-sm">5</button>
                <button onclick="changeQty(10)" id="qty-10" class="qty-btn w-12 h-12 rounded-xl border-2 border-black font-bold bg-white text-black transition-all text-sm">10</button>
            </div>

            <button id="draw-button" onclick="executeDraw()" class="w-full py-6 bg-black text-white rounded-3xl text-2xl font-black active:scale-95 transition-all tracking-widest uppercase">
                GLOW♡
            </button>
        </div>

        <div class="inventory-section">
            <h2 class="text-[11px] font-bold mb-4 opacity-40 tracking-[0.2em] uppercase italic text-left text-black">PRIZE INVENTORY</h2>
            <div id="prizes-status" class="flex flex-col prizes-container text-black">
                </div>
        </div>
        <div class="inventory-base"></div>

        <div id="admin-panel" class="hidden fixed inset-0 z-50 bg-white p-8 overflow-y-auto text-left">
            <div class="flex justify-between items-center mb-8 pb-4 border-b-2 border-black">
                <h2 class="font-black text-2xl italic tracking-tighter">ADMIN & SYNC</h2>
                <button onclick="toggleAdminTab()" class="px-4 py-2 border-2 border-black font-bold rounded-xl text-sm text-black">CLOSE</button>
            </div>
            
            <div class="mb-10 p-6 border-2 border-dashed border-zinc-300 rounded-3xl bg-zinc-50">
                <h3 class="font-black text-sm mb-2 text-black">Sync Code</h3>
                <textarea id="sync-data" class="w-full h-20 p-3 border border-zinc-300 mb-3" readonly></textarea>
                <div class="grid grid-cols-2 gap-2 text-black">
                    <button onclick="copySyncData()" class="py-2 bg-zinc-200 rounded-lg font-bold text-xs">Copy</button>
                    <button onclick="importSyncData()" class="py-2 bg-black text-white rounded-lg font-bold text-xs">Import</button>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4 mb-8 text-black">
                <div class="p-4 border-2 border-black rounded-2xl bg-zinc-50 text-center">
                    <p class="text-[10px] font-bold opacity-50 uppercase">Total Draws</p>
                    <p id="stat-total" class="text-3xl font-black">0</p>
                </div>
                <div class="p-4 border-2 border-black rounded-2xl bg-zinc-50 text-center">
                    <p class="text-[10px] font-bold opacity-50 uppercase">Stock Left</p>
                    <p id="stat-remain" class="text-3xl font-black">0</p>
                </div>
            </div>

            <div id="admin-prize-stats" class="space-y-2 mb-10 text-black"></div>
            <h3 class="font-black mb-4 text-lg text-black">Detailed History</h3>
            <div id="history-log-list" class="space-y-4"></div>

            <button onclick="fullReset()" class="w-full mt-10 py-4 bg-red-50 text-red-600 border-2 border-red-600 rounded-2xl font-bold uppercase text-xs">System Factory Reset</button>
        </div>
    </div>

    <script>
        const PRIZE_CONFIG = [
            { id: 'A', name: '바지', count: 1, limitPerQuart: [0, 0, 1, 1] }, 
            { id: 'B', name: '반다나', count: 9, limitPerQuart: [2, 5, 7, 9] }, 
            { id: 'C', name: '사인폴라로이드', count: 15, limitPerQuart: [4, 8, 12, 15] },
            { id: 'D', name: '사인앨범', count: 15, limitPerQuart: [4, 8, 12, 15] },
            { id: 'E', name: '손그림 로고 키링', count: 60 },
            { id: 'F', name: '포토카드', count: 300, hideCount: true },
            { id: 'G', name: '엽서', count: 600, hideCount: true }
        ];

        let state = [];
        let sessionLogs = [];
        let drawQty = 1;

        function init() {
            const savedState = localStorage.getItem('glow_final_v18_state');
            const savedLogs = localStorage.getItem('glow_final_v18_logs');
            if (savedState) { state = JSON.parse(savedState); } 
            else { state = JSON.parse(JSON.stringify(PRIZE_CONFIG)); save(); }
            if (savedLogs) { sessionLogs = JSON.parse(savedLogs); }
            render();
            updateSyncText();
        }

        function save() {
            localStorage.setItem('glow_final_v18_state', JSON.stringify(state));
            localStorage.setItem('glow_final_v18_logs', JSON.stringify(sessionLogs));
            updateSyncText();
        }

        function updateSyncText() {
            const syncObj = { state, sessionLogs };
            document.getElementById('sync-data').value = btoa(unescape(encodeURIComponent(JSON.stringify(syncObj))));
        }

        function copySyncData() {
            document.getElementById('sync-data').select();
            document.execCommand('copy');
            alert("Copied!");
        }

        function importSyncData() {
            const input = prompt("Sync Code:");
            if (!input) return;
            try {
                const decoded = JSON.parse(decodeURIComponent(escape(atob(input))));
                state = decoded.state; sessionLogs = decoded.sessionLogs;
                save(); location.reload();
            } catch (e) { alert("Error!"); }
        }

        function fullReset() {
            if(confirm("Reset All?")) { localStorage.clear(); location.reload(); }
        }

        function toggleAdminTab() {
            document.getElementById('admin-panel').classList.toggle('hidden');
            if(!document.getElementById('admin-panel').classList.contains('hidden')) renderHistory();
        }

        function changeQty(n) {
            drawQty = n;
            document.querySelectorAll('.qty-btn').forEach(btn => {
                btn.classList.replace('bg-black', 'bg-white'); btn.classList.replace('text-white', 'text-black');
            });
            const activeBtn = document.getElementById(`qty-${n}`);
            activeBtn.classList.replace('bg-white', 'bg-black'); activeBtn.classList.replace('text-black', 'text-white');
        }

        function render() {
            const prizeContainer = document.querySelector('.prizes-container');
            prizeContainer.innerHTML = state.map(item => {
                const out = item.count === 0;
                let statusText = item.hideCount ? (out ? "SOLD OUT" : "IN STOCK") : (out ? "SOLD OUT" : `${item.count} LEFT`);
                return `
                    <div class="prize-row ${out ? 'opacity-20' : ''}">
                        <div class="flex flex-col text-left">
                            <span class="text-[9px] text-zinc-400 font-bold uppercase mb-1 tracking-wider">${item.id} GRADE</span>
                            <span class="font-bold text-lg leading-none">${item.name}</span>
                        </div>
                        <span class="text-[10px] font-black ${item.hideCount && !out ? 'text-blue-600' : 'text-zinc-400'}">${statusText}</span>
                    </div>`;
            }).join('');
        }

        function renderHistory() {
            const totalDrawn = sessionLogs.reduce((acc, s) => acc + s.items.length, 0);
            document.getElementById('stat-total').innerText = totalDrawn;
            document.getElementById('stat-remain').innerText = 1000 - totalDrawn;

            const statsContainer = document.getElementById('admin-prize-stats');
            statsContainer.innerHTML = state.map(item => {
                const initial = PRIZE_CONFIG.find(p => p.id === item.id).count;
                const drawn = initial - item.count;
                const percent = ((drawn / initial) * 100).toFixed(1);
                return `<div class="flex items-center gap-3 text-[11px] text-left"><span class="w-20 font-bold truncate">${item.name}</span><div class="flex-1 h-2 bg-zinc-100 rounded-full overflow-hidden"><div class="h-full bg-black" style="width: ${percent}%"></div></div><span class="w-12 text-right opacity-50">${drawn}회</span></div>`;
            }).join('');

            const logList = document.getElementById('history-log-list');
            logList.innerHTML = sessionLogs.slice().reverse().map(session => `
                <div class="history-item">
                    <div class="flex justify-between items-center mb-2"><span class="text-[10px] font-bold opacity-40">${session.time}</span><span class="text-[10px] font-black">${session.items.length}개</span></div>
                    <div class="flex flex-wrap">${session.items.map(i => `<span class="history-tag ${['A','B','C','D'].includes(i.grade) ? 'tag-special' : ''}">${i.name}</span>`).join('')}</div>
                </div>
            `).join('');
        }

        async function executeDraw() {
            const totalRemaining = state.reduce((acc, cur) => acc + cur.count, 0);
            if (totalRemaining < drawQty) { alert("Stock Out!"); return; }
            document.getElementById('draw-button').disabled = true;
            document.getElementById('intro-text').classList.add('hidden');
            document.getElementById('summary-area').classList.add('hidden');
            document.getElementById('summary-area').innerHTML = "";
            document.getElementById('results-wrapper').innerHTML = "";

            let pickedItems = [];
            const now = new Date();
            const timeStr = `${now.getHours()}:${now.getMinutes().toString().padStart(2,'0')}:${now.getSeconds().toString().padStart(2,'0')}`;

            for (let i = 0; i < drawQty; i++) {
                const drawnSoFar = sessionLogs.reduce((acc, s) => acc + s.items.length, 0);
                const currentQuart = Math.floor(drawnSoFar / 250);
                const pool = state.filter(item => {
                    if (item.count <= 0) return false;
                    if (item.limitPerQuart) {
                        const max = item.limitPerQuart[currentQuart];
                        const drawnTotal = PRIZE_CONFIG.find(p => p.id === item.id).count - item.count;
                        if (drawnTotal >= max) return false;
                    }
                    return true;
                });
                const fallback = pool.length > 0 ? pool : state.filter(item => item.count > 0 && !item.limitPerQuart);
                const total = fallback.reduce((acc, cur) => acc + cur.count, 0);
                let rand = Math.floor(Math.random() * total);
                let acc = 0; let picked = null;
                for (let t of fallback) { acc += t.count; if (rand < acc) { picked = t; state.find(o => o.id === t.id).count--; break; } }
                
                pickedItems.push({ name: picked.name, grade: picked.id });
                
                const card = document.createElement('div');
                card.className = "result-card p-4 rounded-xl flex justify-between items-center shadow-sm mb-2 text-left";
                card.innerHTML = `<div class="flex flex-col"><span class="text-[9px] font-bold opacity-30 uppercase mb-1">${picked.id} RANK</span><span class="text-xl font-black">${picked.name}</span></div><div class="bg-black text-white text-[9px] px-3 py-1 rounded-full font-bold uppercase tracking-widest">Win</div>`;
                document.getElementById('results-wrapper').prepend(card);
                render();
                await new Promise(r => setTimeout(r, 100));
            }

            sessionLogs.push({ time: timeStr, items: pickedItems });
            save();

            const summary = pickedItems.reduce((acc, cur) => { acc[cur.name] = (acc[cur.name] || 0) + 1; return acc; }, {});
            document.getElementById('summary-area').classList.remove('hidden');
            Object.entries(summary).forEach(([name, count]) => {
                const b = document.createElement('div'); b.className = "summary-badge px-4 py-1.5 text-[11px] font-bold"; b.innerText = `${name} × ${count}`;
                document.getElementById('summary-area').appendChild(b);
            });
            document.getElementById('draw-button').disabled = false;
        }

        init();
    </script>
</body>
</html>
