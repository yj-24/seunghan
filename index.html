<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>럭키드로우 프리미엄 - 반투명 Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@700;900&display=swap');
        body { 
            font-family: 'Pretendard', sans-serif; 
            touch-action: manipulation;
            user-select: none;
            background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), 
                        url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=1964&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            min-height: 100vh;
            color: white;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 2rem;
        }
        .result-card { background: white; color: black; animation: slideIn 0.3s ease-out forwards; }
        @keyframes slideIn { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .hidden { display: none !important; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="py-8 px-5">

    <div class="max-w-md mx-auto relative">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-4xl font-black tracking-tighter italic text-white">LUCKY PICK</h1>
            <button id="admin-trigger" onclick="toggleAdminTab()" class="w-10 h-10 rounded-full bg-white/10 text-white/20 font-bold text-[10px] hover:bg-white/20 hover:text-white/40 transition-colors">AD</button>
        </div>

        <div class="glass-panel p-8 shadow-2xl mb-6 text-center border-t border-white/20">
            <div id="display-container" class="h-64 flex flex-col items-center justify-center mb-6 overflow-y-auto no-scrollbar">
                <div id="intro-text" class="text-zinc-400 font-medium text-lg">행운을 확인하세요</div>
                <div id="results-wrapper" class="w-full space-y-2"></div>
            </div>
            
            <div class="flex gap-3 justify-center mb-6">
                <button onclick="changeQty(1)" id="qty-1" class="qty-btn w-12 h-12 rounded-2xl border border-white/20 font-bold bg-white text-black transition-all">1</button>
                <button onclick="changeQty(5)" id="qty-5" class="qty-btn w-12 h-12 rounded-2xl border border-white/20 font-bold hover:bg-white/10 transition-all">5</button>
                <button onclick="changeQty(10)" id="qty-10" class="qty-btn w-12 h-12 rounded-2xl border border-white/20 font-bold hover:bg-white/10 transition-all">10</button>
            </div>

            <button id="draw-button" onclick="executeDraw()" class="w-full py-5 bg-white text-black rounded-2xl text-2xl font-black shadow-[0_0_20px_rgba(255,255,255,0.3)] active:scale-95 transition-all disabled:opacity-30">
                <span id="draw-btn-label">1개 뽑기</span>
            </button>
        </div>

        <div class="glass-panel p-6 shadow-xl border-t border-white/10">
            <h2 class="text-xs font-bold mb-5 opacity-50 tracking-widest uppercase italic">Current Status</h2>
            <div id="prizes-status" class="space-y-4"></div>
        </div>

        <div id="admin-panel" class="hidden fixed inset-x-5 top-20 z-50 glass-panel bg-zinc-900/95 p-8 shadow-2xl border border-white/20">
            <div class="flex justify-between items-center mb-6 border-b border-white/10 pb-4">
                <h2 class="font-black text-xl text-white underline decoration-blue-500 italic">ADMIN DATA</h2>
                <button onclick="toggleAdminTab()" class="text-zinc-500 font-bold">CLOSE</button>
            </div>
            <div id="admin-details" class="space-y-3 font-mono text-xs text-zinc-400 mb-8"></div>
            <button onclick="fullReset()" class="w-full py-4 bg-red-600/20 text-red-500 border border-red-600/30 rounded-xl text-xs font-bold uppercase tracking-widest">System Reset</button>
        </div>
    </div>

    <script>
        // 상품 구성 및 명칭 변경 적용
        // A상 500회 제한 / B~D상 구간별 분산 로직 포함
        const PRIZE_CONFIG = [
            { id: 'A', name: '바지', count: 1, hideCount: false, limitPerQuart: [0, 0, 1, 1] }, 
            { id: 'B', name: '반다나', count: 9, hideCount: false, limitPerQuart: [2, 5, 7, 9] }, 
            { id: 'C', name: '사인폴라로이드', count: 15, hideCount: false, limitPerQuart: [4, 8, 12, 15] },
            { id: 'D', name: '사인앨범', count: 15, hideCount: false, limitPerQuart: [4, 8, 12, 15] },
            { id: 'E', name: '손그림 로고 키링', count: 60, hideCount: false },
            { id: 'F', name: '포토카드', count: 300, hideCount: true }, // 명칭 변경
            { id: 'G', name: '엽서', count: 600, hideCount: true }     // 명칭 변경
        ];

        let state = [];
        let drawQty = 1;

        function init() {
            const saved = localStorage.getItem('lucky_v5');
            if (saved) {
                state = JSON.parse(saved);
            } else {
                state = JSON.parse(JSON.stringify(PRIZE_CONFIG));
                save();
            }
            render();
        }

        function save() { localStorage.setItem('lucky_v5', JSON.stringify(state)); }

        function fullReset() {
            if(confirm("모든 데이터를 초기화하시겠습니까?")) {
                localStorage.removeItem('lucky_v5');
                location.reload();
            }
        }

        function toggleAdminTab() {
            const panel = document.getElementById('admin-panel');
            panel.classList.toggle('hidden');
        }

        function changeQty(n) {
            drawQty = n;
            document.querySelectorAll('.qty-btn').forEach(btn => btn.classList.remove('bg-white', 'text-black'));
            document.getElementById(`qty-${n}`).classList.add('bg-white', 'text-black');
            document.getElementById('draw-btn-label').innerText = `${n}개 뽑기`;
        }

        function render() {
            const prizeContainer = document.getElementById('prizes-status');
            const adminContainer = document.getElementById('admin-details');
            const historyCount = 1000 - state.reduce((acc, cur) => acc + cur.count, 0);

            prizeContainer.innerHTML = state.map(item => {
                const out = item.count === 0;
                let statusText = item.hideCount ? (out ? "SOLD OUT" : "IN STOCK") : (out ? "SOLD OUT" : `${item.count} LEFT`);
                return `
                    <div class="flex justify-between items-center ${out ? 'opacity-20' : ''}">
                        <div class="flex flex-col">
                            <span class="text-[10px] text-zinc-500 font-bold uppercase">${item.id} PRIZE</span>
                            <span class="font-bold text-lg">${item.name}</span>
                        </div>
                        <span class="text-xs font-black ${item.hideCount && !out ? 'text-blue-400' : 'text-zinc-400'}">${statusText}</span>
                    </div>
                `;
            }).join('');

            adminContainer.innerHTML = `
                <div class="mb-4 text-blue-400 font-bold italic">누적 참여 횟수: ${historyCount}회</div>
            ` + state.map(item => `
                <div class="flex justify-between border-b border-white/5 pb-1">
                    <span>${item.id} - ${item.name}</span>
                    <span>${item.count} EA</span>
                </div>
            `).join('');
        }

        async function executeDraw() {
            const btn = document.getElementById('draw-button');
            const wrapper = document.getElementById('results-wrapper');
            const intro = document.getElementById('intro-text');
            
            const totalRemaining = state.reduce((acc, cur) => acc + cur.count, 0);
            if (totalRemaining < drawQty) { alert("잔여 수량이 부족합니다."); return; }

            btn.disabled = true;
            intro.classList.add('hidden');
            wrapper.innerHTML = "";

            for (let i = 0; i < drawQty; i++) {
                const historyCount = 1000 - state.reduce((acc, cur) => acc + cur.count, 0);
                const currentQuart = Math.floor(historyCount / 250);

                const pool = state.filter(item => {
                    if (item.count <= 0) return false;
                    if (item.limitPerQuart) {
                        const maxAllowed = item.limitPerQuart[currentQuart];
                        const drawnSoFar = PRIZE_CONFIG.find(p => p.id === item.id).count - item.count;
                        if (drawnSoFar >= maxAllowed) return false;
                    }
                    return true;
                });

                const fallbackPool = pool.length > 0 ? pool : state.filter(item => item.count > 0 && !item.limitPerQuart);

                const poolTotal = fallbackPool.reduce((acc, cur) => acc + cur.count, 0);
                let rand = Math.floor(Math.random() * poolTotal);
                let acc = 0;
                let picked = null;

                for (let target of fallbackPool) {
                    acc += target.count;
                    if (rand < acc) {
                        picked = target;
                        state.find(orig => orig.id === target.id).count--;
                        break;
                    }
                }

                const card = document.createElement('div');
                card.className = "result-card p-4 rounded-2xl flex justify-between items-center shadow-xl mb-2";
                card.innerHTML = `
                    <div class="flex flex-col">
                        <span class="text-[10px] font-bold opacity-40 uppercase">${picked.id} RANK</span>
                        <span class="text-xl font-black">${picked.name}</span>
                    </div>
                    <div class="bg-black text-white text-[10px] px-3 py-1 rounded-full font-bold">당첨</div>
                `;
                wrapper.appendChild(card);
                document.getElementById('display-container').scrollTop = document.getElementById('display-container').scrollHeight;
                
                save();
                render();
                await new Promise(r => setTimeout(r, 150));
            }
            btn.disabled = false;
        }

        init();
    </script>
</body>
</html>
