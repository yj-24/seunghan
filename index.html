<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>XngHan&Xoul Glow</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@700;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; touch-action: manipulation; user-select: none; background-color: #ffffff; min-height: 100vh; color: #000000; padding-bottom: 250px; overflow-x: hidden; }
        .main-card { background: #ffffff; border: 2px solid #000000; border-radius: 2.5rem; box-shadow: 10px 10px 0px #000000; }
        .inventory-section { background: #ffffff; border: 2px solid #000000; border-bottom: none; border-radius: 2.5rem 2.5rem 0 0; width: 100%; padding: 2.5rem 1.8rem; overflow: visible !important; display: block !important; }
        .inventory-base { background: #000000; height: 12px; width: 100%; border-radius: 0 0 2.5rem 2.5rem; margin-top: -2px; margin-bottom: 50px; }
        .prize-row { display: flex; justify-content: space-between; align-items: center; padding: 1.2rem 0; border-bottom: 1px solid #f0f0f0; }
        .prize-row:last-child { border-bottom: none; }
        .result-card { background: #f3f4f6; color: black; border: 1px solid #000000; animation: slideIn 0.3s ease-out forwards; border-radius: 1.2rem; }
        .summary-badge { background: #000000; color: #ffffff; border-radius: 99px; }
        .glow-highlight { color: #f8ff00; text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000; }
        @keyframes slideIn { from { transform: translateY(12px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .hidden { display: none !important; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="py-10 px-6">
    <div class="max-w-md mx-auto relative">
        <div class="flex justify-between items-start mb-10">
            <div class="flex flex-col text-left">
                <h1 class="text-3xl font-black tracking-tighter leading-none">XngHan&Xoul<br><span class="text-4xl italic glow-highlight">Glow</span></h1>
            </div>
            <button onclick="toggleAdminTab()" class="w-12 h-12 rounded-full border border-zinc-200 text-zinc-300 font-bold text-[10px] flex items-center justify-center">AD</button>
        </div>

        <div class="main-card p-8 mb-12 text-center relative z-10">
            <div id="display-container" class="h-80 flex flex-col items-center justify-start mb-6 overflow-y-auto no-scrollbar pt-2 text-black">
                <div id="intro-text" class="my-auto text-zinc-400 font-medium text-lg italic">Touch to Start</div>
                <div id="summary-area" class="w-full mb-6 flex flex-wrap justify-center gap-2 hidden"></div>
                <div id="results-wrapper" class="w-full space-y-2.5"></div>
            </div>
            
            <div class="flex gap-3 justify-center mb-8">
                <button onclick="changeQty(1)" id="qty-1" class="qty-btn w-12 h-12 rounded-xl border-2 border-black font-bold bg-black text-white transition-all text-sm">1</button>
                <button onclick="changeQty(3)" id="qty-3" class="qty-btn w-12 h-12 rounded-xl border-2 border-black font-bold bg-white text-black transition-all text-sm">3</button>
                <button onclick="changeQty(5)" id="qty-5" class="qty-btn w-12 h-12 rounded-xl border-2 border-black font-bold bg-white text-black transition-all text-sm">5</button>
                <button onclick="changeQty(10)" id="qty-10" class="qty-btn w-12 h-12 rounded-xl border-2 border-black font-bold bg-white text-black transition-all text-sm">10</button>
            </div>

            <button id="draw-button" onclick="executeDraw()" class="w-full py-6 bg-black text-white rounded-3xl text-2xl font-black active:scale-95 transition-all tracking-widest mb-4">GLOW♡</button>
            
            <button id="undo-button" onclick="undoLastDraw()" class="text-[10px] font-bold text-zinc-300 uppercase tracking-widest hidden">실수하셨나요? 방금 뽑기 취소하기 ↩</button>
        </div>

        <div class="inventory-section">
            <h2 class="text-[11px] font-bold mb-4 opacity-40 tracking-[0.2em] uppercase italic text-left text-black">PRIZE INVENTORY</h2>
            <div id="prizes-status" class="flex flex-col prizes-container text-black"></div>
        </div>
        <div class="inventory-base"></div>

        <div id="admin-panel" class="hidden fixed inset-0 z-50 bg-white p-8 overflow-y-auto text-left">
            <div class="flex justify-between items-center mb-8 pb-4 border-b-2 border-black">
                <h2 class="font-black text-2xl italic tracking-tighter text-black">ADMIN</h2>
                <button onclick="toggleAdminTab()" class="px-4 py-2 border-2 border-black font-bold rounded-xl text-sm text-black">CLOSE</button>
            </div>
            <div id="history-log-list" class="space-y-4"></div>
            <button onclick="fullReset()" class="w-full mt-10 py-4 bg-red-50 text-red-600 border-2 border-red-600 rounded-2xl font-bold uppercase text-xs">System Factory Reset</button>
        </div>
    </div>

    <script>
        const PRIZE_CONFIG = [
            { id: 'A', name: '바지', count: 1, limitPerQuart: [0, 0, 1, 1] }, 
            { id: 'B', name: '반다나', count: 9, limitPerQuart: [2, 5, 7, 9] }, 
            { id: 'C', name: '사인폴라로이드', count: 15, limitPerQuart: [4, 8, 12, 15] },
            { id: 'D', name: '사인앨범', count: 15, limitPerQuart: [4, 8, 12, 15] },
            { id: 'E', name: '손그림 로고 키링', count: 60 },
            { id: 'F', name: '포토카드', count: 300, hideCount: true },
            { id: 'G', name: '엽서', count: 600, hideCount: true }
        ];

        let state = [];
        let sessionLogs = [];
        let drawQty = 1;

        function init() {
            const savedState = localStorage.getItem('glow_v22_state');
            const savedLogs = localStorage.getItem('glow_v22_logs');
            if (savedState) { state = JSON.parse(savedState); } 
            else { state = JSON.parse(JSON.stringify(PRIZE_CONFIG)); save(); }
            if (savedLogs) { sessionLogs = JSON.parse(savedLogs); }
            render();
        }

        function save() {
            localStorage.setItem('glow_v22_state', JSON.stringify(state));
            localStorage.setItem('glow_v22_logs', JSON.stringify(sessionLogs));
        }

        function toggleAdminTab() {
            document.getElementById('admin-panel').classList.toggle('hidden');
            if(!document.getElementById('admin-panel').classList.contains('hidden')) renderHistory();
        }

        function changeQty(n) {
            drawQty = n;
            document.querySelectorAll('.qty-btn').forEach(btn => {
                btn.classList.replace('bg-black', 'bg-white'); btn.classList.replace('text-white', 'text-black');
            });
            const activeBtn = document.getElementById(`qty-${n}`);
            activeBtn.classList.replace('bg-white', 'bg-black'); activeBtn.classList.replace('text-black', 'text-white');
        }

        function render() {
            const prizeContainer = document.querySelector('.prizes-container');
            prizeContainer.innerHTML = state.map(item => {
                const out = item.count === 0;
                let statusText = item.hideCount ? (out ? "SOLD OUT" : "IN STOCK") : (out ? "SOLD OUT" : `${item.count} LEFT`);
                return `<div class="prize-row ${out ? 'opacity-20' : ''}"><div class="flex flex-col text-left"><span class="text-[9px] text-zinc-400 font-bold uppercase mb-1 tracking-wider">${item.id} GRADE</span><span class="font-bold text-lg leading-none">${item.name}</span></div><span class="text-[10px] font-black ${item.hideCount && !out ? 'text-blue-600' : 'text-zinc-400'}">${statusText}</span></div>`;
            }).join('');
        }

        // [핵심] 취소 기능 함수
        function undoLastDraw() {
            if (sessionLogs.length === 0) return;
            if (!confirm("방금 진행한 뽑기를 취소하고 재고를 복구할까요?")) return;

            const lastSession = sessionLogs.pop(); // 마지막 로그 꺼내기
            lastSession.items.forEach(pickedItem => {
                const target = state.find(s => s.id === pickedItem.grade);
                if (target) target.count++; // 재고 복구
            });

            save();
            render();
            
            // 화면 초기화
            document.getElementById('results-wrapper').innerHTML = "";
            document.getElementById('summary-area').innerHTML = "";
            document.getElementById('summary-area').classList.add('hidden');
            document.getElementById('intro-text').classList.remove('hidden');
            document.getElementById('undo-button').classList.add('hidden');
            
            alert("취소되었습니다. 재고가 정상 복구되었습니다.");
        }

        async function executeDraw() {
            const totalRemaining = state.reduce((acc, cur) => acc + cur.count, 0);
            if (totalRemaining < drawQty) { alert("Stock Out!"); return; }
            
            document.getElementById('draw-button').disabled = true;
            document.getElementById('undo-button').classList.add('hidden'); // 드로우 시작시 취소버튼 숨김
            document.getElementById('intro-text').classList.add('hidden');
            document.getElementById('summary-area').classList.add('hidden');
            document.getElementById('summary-area').innerHTML = "";
            document.getElementById('results-wrapper').innerHTML = "";

            let pickedItems = [];
            const now = new Date();
            const timeStr = `${now.getHours()}:${now.getMinutes().toString().padStart(2,'0')}:${now.getSeconds().toString().padStart(2,'0')}`;

            for (let i = 0; i < drawQty; i++) {
                const drawnSoFar = sessionLogs.reduce((acc, s) => acc + s.items.length, 0);
                const currentQuart = Math.floor(drawnSoFar / 250);
                const pool = state.filter(item => {
                    if (item.count <= 0) return false;
                    if (item.limitPerQuart) {
                        const max = item.limitPerQuart[currentQuart];
                        const drawnTotal = PRIZE_CONFIG.find(p => p.id === item.id).count - item.count;
                        if (drawnTotal >= max) return false;
                    }
                    return true;
                });
                const fallback = pool.length > 0 ? pool : state.filter(item => item.count > 0 && !item.limitPerQuart);
                const total = fallback.reduce((acc, cur) => acc + cur.count, 0);
                let rand = Math.floor(Math.random() * total);
                let acc = 0; let picked = null;
                for (let t of fallback) { acc += t.count; if (rand < acc) { picked = t; state.find(o => o.id === t.id).count--; break; } }
                
                pickedItems.push({ name: picked.name, grade: picked.id });
                
                const card = document.createElement('div');
                card.className = "result-card p-4 rounded-xl flex justify-between items-center shadow-sm mb-2 text-left";
                card.innerHTML = `<div class="flex flex-col"><span class="text-[9px] font-bold opacity-30 uppercase mb-1">${picked.id} RANK</span><span class="text-xl font-black">${picked.name}</span></div><div class="bg-black text-white text-[9px] px-3 py-1 rounded-full font-bold uppercase">Win</div>`;
                document.getElementById('results-wrapper').prepend(card);
                render();
                await new Promise(r => setTimeout(r, 100));
            }

            sessionLogs.push({ time: timeStr, items: pickedItems });
            save();

            const summary = pickedItems.reduce((acc, cur) => { acc[cur.name] = (acc[cur.name] || 0) + 1; return acc; }, {});
            document.getElementById('summary-area').classList.remove('hidden');
            Object.entries(summary).forEach(([name, count]) => {
                const b = document.createElement('div'); b.className = "summary-badge px-4 py-1.5 text-[11px] font-bold"; b.innerText = `${name} × ${count}`;
                document.getElementById('summary-area').appendChild(b);
            });
            
            document.getElementById('draw-button').disabled = false;
            document.getElementById('undo-button').classList.remove('hidden'); // 드로우 완료 후 취소버튼 노출
        }
        init();
    </script>
</body>
</html>
