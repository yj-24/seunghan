<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>XngHan&Xoul Glow Draw</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@700;900&display=swap');
        
        body { 
            font-family: 'Pretendard', sans-serif; 
            touch-action: manipulation;
            user-select: none;
            /* 배경 이미지: 이미지 파일 없이도 출력되도록 인라인 데이터로 처리 */
            background: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)), 
                        url('https://api.together.xyz/v1/files/65f9b4c1-4c12-4c1a-8c1a-8c1a8c1a8c1a/content'),
                        #000; /* 이미지 로딩 전 배경색 */
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            color: white;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 2.5rem;
        }

        .result-card { 
            background: rgba(255, 255, 255, 0.95); 
            color: black; 
            animation: slideIn 0.3s ease-out forwards; 
            border-radius: 1.5rem;
        }

        .summary-badge { 
            background: rgba(255, 255, 255, 0.15); 
            border: 1px solid rgba(255, 255, 255, 0.2); 
            backdrop-filter: blur(5px);
        }

        @keyframes slideIn { 
            from { transform: translateY(12px); opacity: 0; } 
            to { transform: translateY(0); opacity: 1; } 
        }

        .hidden { display: none !important; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .glow-text {
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.5);
        }

        /* 관리자 버튼 스타일 개선 */
        #admin-trigger {
            cursor: pointer;
            z-index: 100;
        }
    </style>
</head>
<body class="py-10 px-6">

    <div class="max-w-md mx-auto relative">
        <!-- 상단 타이틀 -->
        <div class="flex justify-between items-start mb-10">
            <div class="flex flex-col text-left">
                <h1 class="text-3xl font-black tracking-tighter leading-none glow-text">
                    XngHan&Xoul<br>
                    <span class="text-4xl text-blue-400 italic">Glow</span>
                </h1>
            </div>
            <!-- 반투명 관리자 버튼 -->
            <button id="admin-trigger" onclick="toggleAdminTab()" class="w-12 h-12 rounded-full bg-white/10 text-white/30 font-bold text-[10px] hover:bg-white/20 transition-all flex items-center justify-center">AD</button>
        </div>

        <!-- 메인 뽑기 카드 -->
        <div class="glass-panel p-8 shadow-2xl mb-8 text-center border-t border-white/20">
            <div id="display-container" class="h-80 flex flex-col items-center justify-start mb-6 overflow-y-auto no-scrollbar pt-2">
                <div id="intro-text" class="my-auto text-zinc-300 font-medium text-lg italic">Touch to Glow!</div>
                
                <!-- 당첨 요약 영역 -->
                <div id="summary-area" class="w-full mb-6 flex flex-wrap justify-center gap-2 hidden"></div>
                
                <!-- 결과 리스트 -->
                <div id="results-wrapper" class="w-full space-y-2.5"></div>
            </div>
            
            <!-- 개수 선택 -->
            <div class="flex gap-4 justify-center mb-8">
                <button onclick="changeQty(1)" id="qty-1" class="qty-btn w-14 h-14 rounded-2xl border border-white/10 font-bold bg-white text-black transition-all shadow-lg">1</button>
                <button onclick="changeQty(5)" id="qty-5" class="qty-btn w-14 h-14 rounded-2xl border border-white/10 font-bold bg-white/5 text-white hover:bg-white/10 transition-all">5</button>
                <button onclick="changeQty(10)" id="qty-10" class="qty-btn w-14 h-14 rounded-2xl border border-white/10 font-bold bg-white/5 text-white hover:bg-white/10 transition-all">10</button>
            </div>

            <button id="draw-button" onclick="executeDraw()" class="w-full py-6 bg-white text-black rounded-3xl text-2xl font-black shadow-[0_10px_30px_rgba(255,255,255,0.2)] active:scale-95 transition-all disabled:opacity-20">
                <span id="draw-btn-label">1개 뽑기</span>
            </button>
        </div>

        <!-- 하단 상품 현황판 (1000개 표시 없음) -->
        <div class="glass-panel p-7 shadow-xl border-t border-white/10">
            <h2 class="text-[10px] font-bold mb-6 opacity-40 tracking-[0.2em] uppercase italic text-left">Prize Inventory</h2>
            <div id="prizes-status" class="space-y-5"></div>
        </div>

        <!-- 관리자 상세 패널 -->
        <div id="admin-panel" class="hidden fixed inset-x-6 top-24 z-50 glass-panel bg-zinc-950/95 p-8 shadow-2xl border border-white/10">
            <div class="flex justify-between items-center mb-6 border-b border-white/10 pb-4">
                <h2 class="font-black text-xl text-blue-400 italic">ADMIN DATA</h2>
                <button onclick="toggleAdminTab()" class="text-zinc-600 font-bold text-sm">CLOSE</button>
            </div>
            <div id="admin-details" class="space-y-3 font-mono text-xs text-zinc-500 mb-8 text-left"></div>
            <button onclick="fullReset()" class="w-full py-4 bg-red-900/20 text-red-500 border border-red-900/30 rounded-2xl text-[10px] font-bold uppercase tracking-widest">System Factory Reset</button>
        </div>
    </div>

    <script>
        // 상품 설정 (A상 500회 제한 / B~D상 분산 배출 로직 포함)
        const PRIZE_CONFIG = [
            { id: 'A', name: '바지', count: 1, hideCount: false, limitPerQuart: [0, 0, 1, 1] }, 
            { id: 'B', name: '반다나', count: 9, hideCount: false, limitPerQuart: [2, 5, 7, 9] }, 
            { id: 'C', name: '사인폴라로이드', count: 15, hideCount: false, limitPerQuart: [4, 8, 12, 15] },
            { id: 'D', name: '사인앨범', count: 15, hideCount: false, limitPerQuart: [4, 8, 12, 15] },
            { id: 'E', name: '손그림 로고 키링', count: 60, hideCount: false },
            { id: 'F', name: '포토카드', count: 300, hideCount: true },
            { id: 'G', name: '엽서', count: 600, hideCount: true }
        ];

        let state = [];
        let drawQty = 1;

        function init() {
            const saved = localStorage.getItem('lucky_final_v100');
            if (saved) {
                state = JSON.parse(saved);
            } else {
                state = JSON.parse(JSON.stringify(PRIZE_CONFIG));
                save();
            }
            render();
        }

        function save() { localStorage.setItem('lucky_final_v100', JSON.stringify(state)); }

        function fullReset() {
            if(confirm("주의: 모든 데이터를 초기화하고 1000개 수량으로 리셋할까요?")) {
                localStorage.removeItem('lucky_final_v100');
                location.reload();
            }
        }

        function toggleAdminTab() {
            const panel = document.getElementById('admin-panel');
            panel.classList.toggle('hidden');
        }

        function changeQty(n) {
            drawQty = n;
            document.querySelectorAll('.qty-btn').forEach(btn => {
                btn.classList.remove('bg-white', 'text-black');
                btn.classList.add('bg-white/5', 'text-white');
            });
            const activeBtn = document.getElementById(`qty-${n}`);
            activeBtn.classList.remove('bg-white/5', 'text-white');
            activeBtn.classList.add('bg-white', 'text-black');
            document.getElementById('draw-btn-label').innerText = `${n}개 뽑기`;
        }

        function render() {
            const prizeContainer = document.getElementById('prizes-status');
            const adminContainer = document.getElementById('admin-details');
            const historyCount = 1000 - state.reduce((acc, cur) => acc + cur.count, 0);

            prizeContainer.innerHTML = state.map(item => {
                const out = item.count === 0;
                let statusText = item.hideCount ? (out ? "SOLD OUT" : "IN STOCK") : (out ? "SOLD OUT" : `${item.count} LEFT`);
                return `
                    <div class="flex justify-between items-center ${out ? 'opacity-20' : ''}">
                        <div class="flex flex-col text-left">
                            <span class="text-[9px] text-zinc-500 font-bold uppercase mb-1 tracking-wider">${item.id} GRADE</span>
                            <span class="font-bold text-lg leading-none text-white">${item.name}</span>
                        </div>
                        <span class="text-[10px] font-black ${item.hideCount && !out ? 'text-blue-400' : 'text-zinc-500'}">${statusText}</span>
                    </div>
                `;
            }).join('');

            adminContainer.innerHTML = `
                <div class="mb-4 text-blue-400 font-bold italic border-b border-white/10 pb-2">누적 참여 횟수: ${historyCount}회</div>
            ` + state.map(item => `
                <div class="flex justify-between border-b border-white/5 pb-1">
                    <span>${item.id} - ${item.name}</span>
                    <span>${item.count} / ${PRIZE_CONFIG.find(p => p.id === item.id).count}</span>
                </div>
            `).join('');
        }

        async function executeDraw() {
            const btn = document.getElementById('draw-button');
            const wrapper = document.getElementById('results-wrapper');
            const summaryArea = document.getElementById('summary-area');
            const intro = document.getElementById('intro-text');
            
            const totalRemaining = state.reduce((acc, cur) => acc + cur.count, 0);
            if (totalRemaining < drawQty) { alert("잔여 수량이 부족합니다."); return; }

            btn.disabled = true;
            intro.classList.add('hidden');
            summaryArea.classList.add('hidden');
            summaryArea.innerHTML = "";
            wrapper.innerHTML = "";

            let pickedList = [];

            for (let i = 0; i < drawQty; i++) {
                const historyCount = 1000 - state.reduce((acc, cur) => acc + cur.count, 0);
                const currentQuart = Math.floor(historyCount / 250);

                const pool = state.filter(item => {
                    if (item.count <= 0) return false;
                    if (item.limitPerQuart) {
                        const maxAllowed = item.limitPerQuart[currentQuart];
                        const drawnSoFar = PRIZE_CONFIG.find(p => p.id === item.id).count - item.count;
                        if (drawnSoFar >= maxAllowed) return false;
                    }
                    return true;
                });

                const fallbackPool = pool.length > 0 ? pool : state.filter(item => item.count > 0 && !item.limitPerQuart);
                const poolTotal = fallbackPool.reduce((acc, cur) => acc + cur.count, 0);
                let rand = Math.floor(Math.random() * poolTotal);
                let accTotal = 0;
                let picked = null;

                for (let target of fallbackPool) {
                    accTotal += target.count;
                    if (rand < accTotal) {
                        picked = target;
                        state.find(orig => orig.id === target.id).count--;
                        break;
                    }
                }

                pickedList.push(picked);

                const card = document.createElement('div');
                card.className = "result-card p-4 rounded-[1.5rem] flex justify-between items-center shadow-xl mb-3";
                card.innerHTML = `
                    <div class="flex flex-col text-left">
                        <span class="text-[9px] font-bold opacity-30 uppercase mb-1">${picked.id} RANK</span>
                        <span class="text-xl font-black">${picked.name}</span>
                    </div>
                    <div class="bg-blue-600 text-white text-[9px] px-3 py-1 rounded-full font-bold">GET</div>
                `;
                wrapper.prepend(card);
                
                save();
                render();
                await new Promise(r => setTimeout(r, 120));
            }

            // 당첨 요약 생성
            const summary = pickedList.reduce((acc, cur) => {
                acc[cur.name] = (acc[cur.name] || 0) + 1;
                return acc;
            }, {});

            summaryArea.classList.remove('hidden');
            Object.entries(summary).forEach(([name, count]) => {
                const badge = document.createElement('div');
                badge.className = "summary-badge px-4 py-1.5 rounded-full text-[11px] font-bold border border-white/20";
                badge.innerText = `${name} × ${count}`;
                summaryArea.appendChild(badge);
            });

            btn.disabled = false;
        }

        init();
    </script>
</body>
</html>
